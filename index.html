<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أجمل سنة مع أرنوبتي 💖</title>
    <style>
        body { margin: 0; font-family: 'Arial', sans-serif; background: #fff0f5; text-align: center; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .container { background: white; padding: 25px; border-radius: 25px; box-shadow: 0 10px 30px rgba(255, 77, 136, 0.2); width: 85%; max-width: 380px; z-index: 10; border: 2px solid #ffb6c1; }
        .our-photo { width: 100%; border-radius: 15px; margin-bottom: 15px; border: 3px solid #ff4d88; box-shadow: 0 5px 15px rgba(0,0,0,0.1); display: block; }
        h2 { color: #d63384; font-size: 22px; margin-bottom: 10px; }
        #counter, #finalCounter { font-size: 17px; color: #ff4d88; font-weight: bold; margin: 15px 0; background: #fff9fb; padding: 12px; border-radius: 15px; border: 1px dashed #ff4d88; line-height: 1.6; }
        button { background: #ff4d88; border: none; padding: 12px 25px; border-radius: 50px; color: white; font-size: 16px; cursor: pointer; box-shadow: 0 4px 15px rgba(255, 77, 136, 0.3); transition: 0.3s; }
        button:hover { transform: scale(1.05); }
        .hidden { display: none; }
        #noBtn { background: #999; position: relative; z-index: 100; }
        .heart { position: fixed; top: -10%; font-size: 24px; pointer-events: none; z-index: 5; animation: fall linear forwards; }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); opacity: 0; } }
    </style>
</head>
<body>

<audio id="myMusic" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<div class="container" id="page1">
    <img src="https://i.ibb.co/C5Xz8Yp/rftghC90.jpg" class="our-photo" alt="ذكرى غالية">
