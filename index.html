<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الخزنة الملكية 🔐</title>
    <style>
        :root { --gold: #d4af37; --dark: #1a1a1a; }
        body { margin: 0; font-family: 'Times New Roman', serif; background: var(--dark); color: white; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        
        #lock-screen { text-align: center; transition: 0.8s; }
        .keypad { display: grid; grid-template-columns: repeat(3, 70px); gap: 15px; margin-top: 20px; justify-content: center; }
        .key { width: 70px; height: 70px; border: 1px solid var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; transition: 0.3s; color: var(--gold); -webkit-tap-highlight-color: transparent; }
        .key:active { background: var(--gold); color: var(--dark); }
        .dots { display: flex; justify-content: center; gap: 15px; margin-bottom: 20px; }
        .dot { width: 15px; height: 15px; border: 1px solid var(--gold); border-radius: 50%; }
        .dot.active { background: var(--gold); box-shadow: 0 0 10px var(--gold); }

        #content { opacity: 0; transform: scale(0.9); transition: 1.5s; text-align: center; width: 90%; max-width: 500px; position: absolute; pointer-events: none; }
        .safe-open #lock-screen { opacity: 0; transform: translateY(-100px); pointer-events: none; }
        .safe-open #content { opacity: 1; transform: scale(1); pointer-events: auto; }

        h1 { color: var(--gold); font-size: 28px; letter-spacing: 2px; }
        .divider { width: 100px; height: 2px; background: var(--gold); margin: 20px auto; }
        #counter { font-size: 18px; line-height: 2; color: #eee; background: rgba(212, 175, 55, 0.1); padding: 20px; border-radius: 10px; border: 1px solid rgba(212, 175, 55, 0.3); direction: ltr; }
        
        .message { font-size: 18px; font-style: italic; margin-top: 20px; line-height: 1.8; color: #ccc; }
        .footer-note { margin-top: 30px; color: var(--gold); font-size: 14px; letter-spacing: 5px; opacity: 0.7; }

        .gold-heart { position: fixed; color: var(--gold); pointer-events: none; animation: fly 4s linear forwards; z-index: 100; }
        @keyframes fly { to { transform: translateY(-110vh) rotate(360deg); opacity: 0; } }
    </style>
</head>
<body>

    <div id="lock-screen">
        <h2 style="color: var(--gold); font-weight: 100;">أدخلي رمز الخزنة</h2>
        <p style="font-size: 12px; opacity: 0.6;">(يوم لقائنا المميز)</p>
        <div class="dots" id="dots">
            <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>
        <div class="keypad">
            <div class="key" onclick="press('1')">1</div><div class="key" onclick="press('2')">2</div><div class="key" onclick="press('3')">3</div>
            <div class="key" onclick="press('4')">4</div><div class="key" onclick="press('5')">5</div><div class="key" onclick="press('6')">6</div>
            <div class="key" onclick="press('7')">7</div><div class="key" onclick="press('8')">8</div><div class="key" onclick="press('9')">9</div>
            <div></div><div class="key" onclick="press('0')">0</div><div></div>
        </div>
    </div>

    <div id="content">
        <h1>لأرنوبتي.. 👑</h1>
        <div class="divider"></div>
        <div id="counter">جاري الحساب...</div>
        <div class="message">
            مرت سنة.. ولا زلتِ أنتِ الحدث الأجمل في تاريخي.<br>
            كل يوم معكِ هو انتصار جديد لقلبي.<br>
            شكراً لأنكِ كنتِ بجانبي طوال هذا الوقت.
        </div>
        <div class="divider"></div>
        <div id="secret-word" style="font-size: 24px; color: var(--gold); font-weight: bold;">أحبكِ.. وبقوة 🤍</div>
        <div class="footer-note">SINCE 2025</div>
    </div>

    <script>
        let input = "";
        const code = "2304"; // الرمز المعدل لتاريخ 23/04

        function press(num) {
            if (input.length < 4) {
                input += num;
                updateDots();
                if (input.length === 4) {
                    if (input === code) {
                        unlock();
                    } else {
                        setTimeout(reset, 500);
                    }
                }
            }
        }

        function updateDots() {
            const dots = document.querySelectorAll('.dot');
            dots.forEach((dot, i) => {
                if (i < input.length) dot.classList.add('active');
                else dot.classList.remove('active');
            });
        }

        function reset() {
            input = "";
            updateDots();
            const screen = document.getElementById('lock-screen');
            screen.style.transform = "translateX(10px)";
            setTimeout(() => screen.style.transform = "translateX(-10px)", 50);
            setTimeout(() => screen.style.transform = "translateX(0)", 100);
        }

        function unlock() {
            document.body.classList.add('safe-open');
            setInterval(createGoldHeart, 300
