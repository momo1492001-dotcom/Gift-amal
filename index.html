<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لأرنوبتي 💖</title>
<style>
    body {
        margin: 0;
        font-family: 'Arial', sans-serif;
        background: #fff0f5;
        color: #333;
        text-align: center;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        overflow: hidden;
    }
    .container {
        background: white;
        padding: 30px;
        border-radius: 20px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        width: 85%;
        max-width: 400px;
        position: relative;
        z-index: 10;
    }
    h2 { color: #d63384; font-size: 22px; margin-bottom: 15px; }
    #counter {
        font-size: 16px;
        color: #ff4d88;
        font-weight: bold;
        margin: 15px 0;
        background: #fff9fb;
        padding: 10px;
        border-radius: 10px;
        line-height: 1.6;
    }
    button {
        background: #ff4d88;
        border: none;
        padding: 12px 25px;
        border-radius: 25px;
        color: white;
        font-size: 16px;
        margin: 10px;
        cursor: pointer;
    }
    #noBtn { background: #888; position: relative; z-index: 100; }
    .hidden { display: none; }
    #secret { font-weight: bold; color: #ff4d88; font-size: 24px; animation: heartBeat 1s infinite; margin-top: 10px; }
    @keyframes heartBeat { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
    .heart-fall { position: fixed; top: -10%; font-size: 20px; pointer-events: none; z-index: 5; animation: fall linear forwards; }
    @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }
</style>
</head>
<body>

<div class="container" id="start">
    <h2>أرنوبتي... قربنا سنة 💌</h2>
    <div id="counter">جاري الحساب... ⏳</div>
    <button onclick="go('q1')">ابدأ</button>
</div>

<div class="container hidden" id="q1">
    <h2>لسه تحبيني؟ 😏</h2>
    <div style="display: flex; justify-content: center; gap: 10px;">
        <button onclick="go('q2')">أكيد</button>
        <button id="noBtn" onmouseover="move()" ontouchstart="move(event)">لا</button>
    </div>
</div>

<div class="container hidden" id="q2">
    <h2>ولسه تشتاقي لي؟ 🥺</h2>
    <button onclick="go('final')">دايم</button>
    <button onclick="go('final')">مره</button>
</div>

<div class="container hidden" id="final">
    <h2>قربنا سنة يا أرنوبتي 🎉💖</h2>
    <p>يا أرنوبتي...<br>صار لنا مع بعض:</p>
    <div id="finalCounter" style="color: #ff4d88; font-weight: bold; margin-bottom: 15px; font-size: 18px;"></div>
    <button id="secretBtn" onclick="showSecret()">اضغطي هنا 😳</button>
    <p id="secret" class="hidden">أحبك… وبقوة 🤍</p>
</div>

<script>
// --- تم تعديل التاريخ ليكون 27 أبريل 2025 ---
const startDate = new Date(2025, 3, 27); 

function updateCounter() {
    const now = new Date();
    const diff = now - startDate;
    
    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
    const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
    const minutes = Math.floor((diff / (1000 * 60)) % 60);
    const seconds = Math.floor((diff / 1000) % 60);

    const text = `صِرنا مع بعض: <br>${days} يوم و ${hours} ساعة و ${minutes} دقيقة و ${seconds} ثانية`;
    
    document.getElementById("counter").innerHTML = text;
    if(document.getElementById("finalCounter")) {
        document.getElementById("finalCounter").innerHTML = text;
    }
}

// تحديث العداد كل ثانية
setInterval(updateCounter, 1000);
updateCounter();

function go(id){
    document.querySelectorAll(".container").forEach(c => c.classList.add("hidden"));
    document.getElementById(id).classList.remove("hidden");
}

function move(e){
    if(e) e.preventDefault();
    const btn = document.getElementById("noBtn");
    const x = Math.random() * (window.innerWidth - btn.offsetWidth);
    const y = Math.random() * (window.innerHeight - btn.offsetHeight);
    btn.style.position = "fixed";
    btn.style.left = x + "px";
    btn.style.top = y + "px";
}

function showSecret(){
    document.getElementById("secretBtn").classList.add("hidden");
    document.getElementById("secret").classList.remove("hidden");
    // تشغيل القلوب والورود
    setInterval(createHeart, 300);
}

function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart-fall");
    // تنويع الأشكال (قلوب، زهور، وأرانب)
    heart.innerHTML = ["❤️", "💖", "🌸", "🐰", "✨"][Math.floor(Math.random() * 5)];
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = Math.random() *
