<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لأرنوبتي 💖</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #111;
    color: white;
    text-align: center;
}

.container {
    padding: 30px 15px;
}

button {
    background: #ff4d88;
    border: none;
    padding: 12px 25px;
    border-radius: 25px;
    color: white;
    font-size: 16px;
    margin: 10px;
}

.hidden { display: none; }
</style>
</head>

<body>

<div class="container" id="start">
    <h2>أرنوبتي... قربنا سنة 💌</h2>
    <button onclick="startPage()">ابدأ</button>
</div>

<div class="container hidden" id="q1">
    <h2>لسه تحبيني؟ 😏</h2>
    <button onclick="go('q2')">أكيد</button>
    <button id="noBtn">لا</button>
</div>

<div class="container hidden" id="q2">
    <h2>ولسه تشتاقي لي؟ 🥺</h2>
    <button onclick="go('final')">دايم</button>
    <button onclick="go('final')">مره</button>
</div>

<div class="container hidden" id="final">
    <h2>قربنا سنة يا أرنوبتي 🎉💖</h2>

    <p>
    يا أرنوبتي...<br><br>
    قربنا نكمل سنة مع بعض 🤍<br>
    وكل يوم معك كان له معنى مختلف 💖
    </p>

    <button onclick="showSecret()">اضغطي هنا 😳</button>

    <p id="secret" class="hidden">
    أحبك… وبقوة 🤍
    </p>
</div>

<script>

// زر البداية
function startPage(){
    document.getElementById("start").classList.add("hidden");
    document.getElementById("q1").classList.remove("hidden");
}

// التنقل
function go(id){
    document.querySelectorAll(".container").forEach(c => c.classList.add("hidden"));
    document.getElementById(id).classList.remove("hidden");
}

// زر لا يهرب
let noBtn = document.getElementById("noBtn");

noBtn.addEventListener("touchstart", move);
noBtn.addEventListener("mouseover", move);

function move(){
    noBtn.style.position = "absolute";
    noBtn.style.left = Math.random()*80 + "%";
    noBtn.style.top = Math.random()*80 + "%";
}

// زر سري
function showSecret(){
    document.getElementById("secret").classList.remove("hidden");
}

</script>

</body>
</html>
