<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لأرنوبتي 💖</title>
<style>
    body {
        margin: 0;
        font-family: 'Arial', sans-serif;
        background: #fff0f5;
        color: #333;
        text-align: center;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        overflow: hidden;
    }
    .container {
        background: white;
        padding: 30px;
        border-radius: 20px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        width: 85%;
        max-width: 400px;
        position: relative;
        z-index: 10;
    }
    h2 { color: #d63384; font-size: 22px; margin-bottom: 15px; }
    #counter, #finalCounter {
        font-size: 18px;
        color: #ff4d88;
        font-weight: bold;
        margin: 15px 0;
        line-height: 1.6;
    }
    button {
        background: #ff4d88;
        border: none;
        padding: 12px 25px;
        border-radius: 25px;
        color: white;
        font-size: 16px;
        margin: 10px;
        cursor: pointer;
    }
    #noBtn { background: #888; position: relative; z-index: 100; }
    .hidden { display: none; }
    .heart-fall { position: fixed; top: -10%; font-size: 24px; pointer-events: none; z-index: 5; animation: fall linear forwards; }
    @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }
</style>
</head>
<body>

<div class="container" id="start">
    <h2>أرنوبتي... قربنا سنة 💌</h2>
    <div id="counter">جاري الحساب...</div>
    <button onclick="go('q1')">ابدأ</button>
</div>

<div class="container hidden" id="q1">
    <h2>لسه تحبيني؟ 😏</h2>
    <div style="display: flex; justify-content: center; gap: 10px;">
        <button onclick="go('q2')">أكيد</button>
        <button id="noBtn" onmouseover="move()" ontouchstart="move(event)">لا</button>
    </div>
</div>

<div class="container hidden" id="q2">
    <h2>ولسه تشتاقي لي؟ 🥺</h2>
    <button onclick="go('final')">دايم</button>
    <button onclick="go('final')">مره</button>
</div>

<div class="container hidden" id="final">
    <h2>قربنا سنة يا أرنوبتي 🎉💖</h2>
    <p>صار لنا مع بعض:</p>
    <div id="finalCounter"></div>
    <button id="secretBtn" onclick="showSecret()">اضغطي هنا 😳</button>
    <div id="secret" class="hidden" style="font-size: 26px; color: #ff4d88; font-weight: bold; margin-top: 15px;">أحبك… وبقوة 🤍</div>
</div>

<script>
// التاريخ الصحيح: 27 أبريل 2025
const startTime = new Date("April 27, 2025 00:00:00").getTime();

function updateTimer() {
    const now = new Date().getTime();
    const diff = now - startTime;

    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
    const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
    const seconds = Math.floor((diff % (1000 * 60)) / 1000);

    const timeString = `${days} يوم و ${hours} ساعة<br>${minutes} دقيقة و ${seconds} ثانية`;
    
    document.getElementById("counter").innerHTML = timeString;
    if (document.getElementById("finalCounter")) {
        document.getElementById("finalCounter").innerHTML = timeString;
    }
}

// تحديث فوري ومستمر
setInterval(updateTimer, 1000);
updateTimer();

function go(id){
    const containers = document.querySelectorAll(".container");
    containers.forEach(c => c.classList.add("hidden"));
    document.getElementById(id).classList.remove("hidden");
}

function move(e){
    if(e) e.preventDefault();
    const btn = document.getElementById("noBtn");
    const x = Math.random() * (window.innerWidth - btn.offsetWidth);
    const y = Math.random() * (window.innerHeight - btn.offsetHeight);
    btn.style.position = "fixed";
    btn.style.left = x + "px";
    btn.style.top = y + "px";
}

function showSecret(){
    document.getElementById("secretBtn").classList.add("hidden");
    document.getElementById("secret").classList.remove("hidden");
    setInterval(createHeart, 300);
}

function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart-fall");
    const icons = ["❤️", "💖", "🌸", "🐰", "✨"];
    heart.innerHTML = icons[Math.floor(Math.random() * icons.length)];
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = (Math.random() * 2 + 3) + "s";
    document.body.appendChild(heart);
    setTimeout(() => { heart.remove(); }, 5000);
}
</script>
</body>
</html>
